name: 每日股票数据更新

on:
  # 定时执行：每个交易日北京时间16:00（收盘1小时后，数据已稳定）
  schedule:
    - cron: '0 8 * * 1-5'  # UTC时间8:00 = 北京时间16:00，仅周一到周五运行
  # 手动触发（方便测试）
  workflow_dispatch:

jobs:
  update-stock-data:
    runs-on: ubuntu-latest
    steps:
      - name: 检查是否为A股交易日
        id: check_trading_day
        run: |
          # 获取当前日期（北京时间）
          TODAY=$(TZ='Asia/Shanghai' date +%Y%m%d)
          # 调用接口检查是否为交易日（依赖akshare）
          python -c "
          import akshare as ak
          import sys
          # 获取交易日历
          df = ak.tool_trade_date_hist_sina()
          # 检查今天是否在交易日列表里
          is_trading_day = TODAY in df['trade_date'].values
          sys.exit(0 if is_trading_day else 1)
          "
        continue-on-error: true  # 接口调用失败时不终止
  
      - name: 拉取代码（仅交易日执行）
        if: steps.check_trading_day.outcome == 'success'
        uses: actions/checkout@v4
      
      - name: 设置Python环境（仅交易日执行）
        if: steps.check_trading_day.outcome == 'success'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖（仅交易日执行）
        if: steps.check_trading_day.outcome == 'success'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 运行更新脚本（仅交易日执行）
        if: steps.check_trading_day.outcome == 'success'
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python stock_data_update.py
      
      - name: 提交更新后的表格（仅交易日执行）
        if: steps.check_trading_day.outcome == 'success'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add stock_data.xlsx
          git commit -m "Update stock data $(TZ='Asia/Shanghai' date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
