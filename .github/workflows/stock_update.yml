name: 每日股票数据更新

on:
  schedule:
    - cron: '0 8 * * 1-5'  # 北京时间16:00（A股收盘后），仅周一到周五
  workflow_dispatch:  # 允许手动触发

jobs:
  update-stock-data:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖（国内镜像加速）
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: 检查是否为A股交易日（北京时间）
        id: check_trading_day
        run: |
          python -c "
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import akshare as ak
          import sys
          # 获取北京时间的今日日期
          today = datetime.now(ZoneInfo('Asia/Shanghai')).strftime('%Y%m%d')
          # 获取A股交易日历
          df = ak.tool_trade_date_hist_sina()
          # 检查今天是否在交易日列表中
          is_trading_day = today in df['trade_date'].values
          sys.exit(0 if is_trading_day else 1)
          "
        continue-on-error: true

      - name: 运行更新脚本（仅交易日执行）
        if: steps.check_trading_day.outcome == 'success'
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python stock_data_update.py

      - name: 提交更新后的表格（仅交易日执行）
        if: steps.check_trading_day.outcome == 'success'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add stock_data.xlsx
          git commit -m "Update stock data $(TZ='Asia/Shanghai' date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
