name: 每日股票数据更新

# 触发规则：交易日北京时间16:00自动运行 + 支持手动触发
on:
  schedule:
    - cron: '0 8 * * 1-5'  # UTC 8:00 = 北京时间16:00（A股收盘1小时后），仅周一到周五
  workflow_dispatch:       # 手动触发按钮（测试用）

jobs:
  update-stock-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15    # 超时保护（避免无限运行）
    steps:
      # 步骤1：拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 步骤2：设置Python环境（3.10稳定版）
      - name: 配置Python 3.10环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'      # 缓存依赖，加速后续运行

      # 步骤3：安装依赖（清华源加速 + 显示安装日志）
      - name: 安装Python依赖包
        run: |
          python -m pip install --upgrade pip
          # 清华源加速，显示详细安装日志
          pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple -v

      # 步骤4：检查是否为A股交易日（带调试日志 + 容错逻辑）
      - name: 检查当日是否为A股交易日
        id: check_trading_day
        run: |
          python -c "
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import akshare as ak
          import sys

          # 强制设置时区为北京时间
          tz = ZoneInfo('Asia/Shanghai')
          today = datetime.now(tz).strftime('%Y%m%d')
          print(f'【调试】当前北京时间：{today}')

          # 核心逻辑：优先用实时接口，失败则用日历兜底
          is_trading_day = False
          try:
              # 方法1：实时接口（最准确）
              trade_status = ak.tool_trade_date_is_open()
              print(f'【调试】实时接口返回：{trade_status}')
              is_trading_day = trade_status['is_open'] == '1'
          except Exception as e:
              print(f'【调试】实时接口调用失败：{e}，切换到日历兜底')
              # 方法2：交易日历兜底（兼容不同版本列名）
              df = ak.tool_trade_date_hist_sina()
              col_name = 'trade_date' if 'trade_date' in df.columns else '日期'
              print(f'【调试】交易日历列名：{col_name}，最近5条数据：\\n{df[col_name].tail(5)}')
              is_trading_day = today in df[col_name].values

          print(f'【调试】最终判断：{today} {"是" if is_trading_day else "不是"}A股交易日')
          sys.exit(0 if is_trading_day else 1)
          "
        continue-on-error: true  # 接口异常时不终止整体流程

      # 步骤5：运行股票数据更新脚本（仅交易日执行）
      - name: 执行股票数据更新脚本
        if: steps.check_trading_day.outcome == 'success'
        env:
          # 从GitHub Secrets读取敏感信息
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: |
          echo "开始执行数据更新脚本..."
          python stock_data_update.py
          echo "脚本执行完成！"

      # 步骤6：提交更新后的Excel表格到仓库（仅交易日执行）
      - name: 提交更新后的表格到GitHub
        if: steps.check_trading_day.outcome == 'success'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 检查Excel文件是否存在
          if [ -f "stock_data.xlsx" ]; then
              git add stock_data.xlsx
              # 避免无变更时提交失败
              git commit -m "Update stock data $(TZ='Asia/Shanghai' date +'%Y-%m-%d')" || echo "无数据变更，无需提交"
              git push
              echo "表格已提交到仓库！"
          else
              echo "警告：未生成stock_data.xlsx文件！"
          fi

      # 步骤7：输出运行结果（调试用）
      - name: 输出最终运行状态
        if: always()  # 无论前面步骤是否成功，都执行
        run: |
          echo "工作流运行完成！"
          echo "交易日检查状态：${{ steps.check_trading_day.outcome }}"
          echo "是否执行了数据更新：${{ steps.check_trading_day.outcome == 'success' && '是' || '否' }}"
